<!DOCTYPE html>

<head></head>

<body>
  <html lang="en">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js">
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css" />
  
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }
    
    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif
    }
    
    .shaka-video-container {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    
    .shaka-seek-bar-container {
      display: none !important;
    }
  </style>
  
  <style>
    .custom-watermark {
      position: absolute;
      z-index: 40;
      pointer-events: none;
      top: 65%;
      left: 11%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.12);
    }
    
    .custom-watermark img {
      height: 52px;
      width: 52px;
      opacity: 80%;
    }
    
    
    @media (max-width: 700px) {
      .custom-watermark {
        font-size: 9px;
        top: 58%;
        left: 4%;
      }
      
      .custom-watermark img {
        height: 45px;
        width: 45px;
        opacity: 80%;
      }
    }
  </style>
  
  <div class="shaka-video-container" id="player-container">
    <video id="video" autoplay muted playsinline preload="metadata"></video>
    <div class="custom-watermark"><img src="https://i.postimg.cc/SNjy16J7/cricketlive.png"></div>
  </div>
  

<script>
  (async () => {
    
    function getParam(name) {
      return new URL(location.href).searchParams.get(name);
    }
    
    /* -------- PARAM -------- */
    const streamUrl = getParam("url");
    const keyId = getParam("keyId");
    const key = getParam("key");
    
    /* -------- COOKIE API (2 BACKUP) -------- */
    const COOKIE_API_1 = "https://allrounder-live2.pages.dev/api/star-1-hindi.json";
    const COOKIE_API_2 = "https://allrounder-live2.pages.dev/api/star-1.json";
    
    if (!streamUrl) {
      alert("Stream URL missing");
      return;
    }
    
    /* -------- SHAKA -------- */
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) return;
    
    const video = document.getElementById("video");
    const container = document.getElementById("player-container");
    
    const player = new shaka.Player();
    await player.attach(video);
    
    const ui = new shaka.ui.Overlay(player, container, video);
    
    /* UI SAME */
    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: [
        "mute", "play_pause", "time_and_duration",
        "spacer", "quality", "picture_in_picture", "fullscreen"
      ]
    });
    
    /* -------- DRM -------- */
    if (keyId && key) {
      player.configure({
        drm: {
          clearKeys: {
            [keyId]: key
          }
        }
      });
    }
    
    /* -------- COOKIE FUNCTION -------- */
    async function getCookie() {
      
      let cookie = "";
      
      /* TRY 1 */
      try {
        const res1 = await fetch(COOKIE_API_1, { cache: "no-store" });
        const data1 = await res1.json();
        cookie = data1.cookie || "";
      } catch (e) {}
      
      /* TRY 2 (backup) */
      if (!cookie) {
        try {
          const res2 = await fetch(COOKIE_API_2, { cache: "no-store" });
          const data2 = await res2.json();
          cookie = data2.cookie || "";
        } catch (e) {}
      }
      
      return cookie;
    }
    
    /* CALL COOKIE */
    const cookie = await getCookie();
    
    /* -------- REQUEST FILTER -------- */
    player.getNetworkingEngine().registerRequestFilter((type, req) => {
      
      req.headers["Referer"] = "https://www.jiotv.com/";
      req.headers["User-Agent"] = "plaYtv/7.1.5 (Android)";
      
      if (cookie) {
        
        req.headers["Cookie"] = cookie;
        
        let token = cookie.startsWith("__hdnea__=") ?
          cookie.slice(10) :
          cookie;
        
        if (
          (type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
            type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
          !req.uris[0].includes("__hdnea__")
        ) {
          const sep = req.uris[0].includes("?") ? "&" : "?";
          req.uris[0] += sep + "__hdnea__=" + token;
        }
        
      }
      
    });
    
    /* -------- PLAYER CONFIG -------- */
    player.configure({
      streaming: {
        lowLatencyMode: true,
        bufferingGoal: 10,
        rebufferingGoal: 2
      }
    });
    
    /* -------- LOAD -------- */
    try {
      await player.load(streamUrl);
      video.play().catch(() => {});
    } catch (e) {
      console.error("LOAD ERROR:", e);
      alert("Stream not working / expired cookie");
    }
    
    video.addEventListener("play", () => video.muted = false);
    
  })();
</script>
</body>

</html>
