<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Stream Player</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
}

.shaka-video-container{
position:fixed;
inset:0;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

.custom-watermark{
position:absolute;
top:65%;
left:11%;
pointer-events:none;
}

.custom-watermark img{
height:52px;
width:52px;
opacity:.8;
}
</style>

</head>

<body>

<div class="shaka-video-container" id="player-container">

<video id="video" autoplay muted playsinline></video>

<div class="custom-watermark">
<img src="https://i.postimg.cc/SKhzQBJB/cricketlive.png">
</div>

</div>

<script>

function getParam(name){
const url=new URL(window.location.href);
return url.searchParams.get(name);
}

const streamUrl=getParam("url");
const keyId=getParam("keyId");
const key=getParam("key");

if(!streamUrl){
alert("Stream URL missing");
}

document.addEventListener("DOMContentLoaded",async()=>{

const video=document.getElementById("video");
const container=document.getElementById("player-container");

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){
alert("Browser not supported");
return;
}

const player=new shaka.Player();
await player.attach(video);

const ui=new shaka.ui.Overlay(player,container,video);

ui.configure({
controlPanelElements:[
"play_pause",
"time_and_duration",
"spacer",
"quality",
"mute",
"fullscreen"
"picture_in_picture"
]
});

if(keyId && key){
player.configure({
drm:{
clearKeys:{
[keyId]:key
}
}
});
}

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://www.jiotv.com/";
request.headers["User-Agent"]="playtv/7.1.5";

});

try{

await player.load(streamUrl);

video.play().catch(()=>{});

}catch(e){

console.error(e);

}

});

</script>

</body>
</html>
